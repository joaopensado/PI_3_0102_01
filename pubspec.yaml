name: arquivocapivara_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
 
  # e quando fizer alterações nessa pagina no terminal: flutter pub get 
    - assets/fundo/
    - assets/audio/

  fonts:
    - family: PixelifySans
      fonts:
        - asset: assets/fonts/PixelifySans-VariableFont_wght.ttf