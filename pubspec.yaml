name: arquivocapivara_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  video_player: ^2.8.6
  audioplayers: ^6.0.0
  geolocator: ^12.0.0
  flutter_map: ^7.0.0
  latlong2: ^0.9.0
  permission_handler: ^11.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/fundo/
    - assets/personagens/
    - assets/videos/
    - assets/audio/

  fonts:
    - family: PixelifySans
      fonts:
        - asset: assets/fonts/PixelifySans-VariableFont_wght.ttf